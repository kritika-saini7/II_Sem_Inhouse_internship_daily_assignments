<!DOCTYPE html>
<html lang="en">

<head>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <h2 class="text-center mb-4">Student Records</h2>

        <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">

        <div id="container" class="row g-4"></div>

    </div>

    <script>
        let users = [];

        function renderUsers(filter = "") {
            const searchTerm = filter.toLowerCase().trim();
            const filteredUsers = users.filter(user => {
                return (
                    user.name.toLowerCase().includes(searchTerm) ||
                    user.phone.toLowerCase().includes(searchTerm) ||
                    String(user.id).includes(searchTerm)
                );
            });

            let html = "";

            filteredUsers.forEach(user => {
                html += `
                    <div class="col-md-4 card-item">
                        <div class="card shadow">
                            <div class="card-body">
                                <h4>${user.name}</h4>

                                <button class="btn btn-primary btn-sm mt-2 show-btn">
                                    Show Details
                                </button>

                                <div class="details mt-3" style="display:none;">
                                    <img src="https://i.pravatar.cc/300?img=${user.id}" alt="${user.name}" class="img-fluid rounded mb-3">
                                    <p><strong>ID:</strong> ${user.id}</p>
                                    <p><strong>Phone:</strong> ${user.phone}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            $("#container").html(html);
        }

        $(document).on("click", ".show-btn", function () {
            $(this).next(".details").slideToggle();
        });

        $("#search").on("input", function () {
            renderUsers($(this).val());
        });

        fetch("https://jsonplaceholder.typicode.com/users")
            .then(response => response.json())
            .then(data => {
                users = data;
                renderUsers();
            })
            .catch(error => console.error(error));
    </script>


</body>

</html>
