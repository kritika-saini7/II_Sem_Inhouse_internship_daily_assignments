<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            width: 100px;
            position: absolute;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <p>Apple: <span id="apple">0</span></p>
    <p>Banana: <span id="banana">0</span></p>

    <img src="apple.jpg" onclick="clickImage('apple',this)">
    <img src="banana.jpg" onclick="clickImage('banana',this)">
    

    <script>
        let apple=0, banana=0;

        document.querySelectorAll('img').forEach((img)=>{
           img.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            img.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        });

        function clickImage(type, img){
            if(type=="apple"){
                document.getElementById("apple").innerText = ++apple;
            }
            else{
                document.getElementById("banana").innerText=++banana;
            }


            img.style.left = Math.random() * (window.innerWidth - 100) + 'px';

            img.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        }




    </script>
</body>
</html>
